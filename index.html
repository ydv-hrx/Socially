<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Website Design</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="hero">

        <!-- ================= NAVBAR ================= -->

        <nav>

            <img src="images/logo.png" class="logo" alt="Logo">

            <ul>
                <li><a href="#">Features</a></li>
                <li><a href="#">How it Works</a></li>
                <li><a href="#">Privacy</a></li>
            </ul>

            <div class="nav-btn">
                <a href="#" class="login-btn">Log In</a>
                <a href="#" class="btn">Download App</a>
            </div>

        </nav>

        <!-- ================= CONTENT ================= -->

        <div class="content">

            <h1 class="anim">
                Make <br> New Friends
            </h1>

            <p class="anim">
                Socially is a new social media platform to make new friends online around the world.
                Explore amazing features, connect with people, and build meaningful friendships.
            </p>

            <a href="#" class="btn anim">
                Join Now
            </a>

        </div>

        <!-- ================= IMAGE ================= -->

        <img src="images/pic.png" class="feature-img anim" alt="Social App">

    </div>

</body>

</html>
